<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="shortcut icon" href="https://www.google.com/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin:0; padding:0; width:100%; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overflow:hidden; background:#fff; user-select: none; }
        
        /* 위장 레이아웃 */
        #stealth-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f1f3f4; z-index:999999; }
        .google-header { height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 20px; border-bottom:1px solid #f2f2f2; background:#fff; }
        .header-left, .header-right { display:flex; align-items:center; gap:15px; }
        .nav-btn { background:none; border:none; color:#5f6368; font-size:14px; cursor:pointer; padding:8px 12px; border-radius:4px; font-weight:bold; transition: 0.2s; }
        .nav-btn:hover { background:#f8f9fa; color:#1a73e8; }
        .nav-btn.active { color:#1a73e8; border-bottom:2px solid #1a73e8; border-radius:0; }

        .content-container { width:100%; height:calc(100% - 60px); position:relative; }
        .tab-panel { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
        .tab-panel.active { display:block; }

        /* 1. 구글 검색 홈 위장 */
        .search-panel { display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:120px; }
        .logo { font-size:90px; font-weight:bold; margin-bottom:30px; letter-spacing:-2px; }
        .logo span:nth-child(1) { color: #4285F4; } .logo span:nth-child(2) { color: #EA4335; } .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; } .logo span:nth-child(5) { color: #34A853; } .logo span:nth-child(6) { color: #EA4335; }
        .search-box-wrapper { width:100%; max-width:584px; position:relative; margin-bottom:30px; }
        .search-input { width:100%; height:46px; border:1px solid #dfe1e5; border-radius:24px; padding:0 45px 0 20px; font-size:16px; outline:none; transition:box-shadow 0.2s; }
        .search-input:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color:rgba(223,225,229,0); }
        .search-buttons { display:flex; gap:12px; }
        .g-btn { background:#f8f9fa; border:1px solid #f8f9fa; color:#3c4043; font-size:14px; padding:10px 16px; border-radius:4px; cursor:pointer; }
        .g-btn:hover { border:1px solid #dadce0; color:#202124; background:#f1f3f4; }

        /* 설정창 공통 공용 UI */
        .room-config-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:#fff; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .config-box { background:#f8f9fa; border:1px solid #dadce0; padding:30px; border-radius:8px; width:350px; display:flex; flex-direction:column; gap:12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .config-box h3 { margin:0 0 10px 0; color:#202124; text-align:center; }
        .config-box input { width:100%; height:40px; padding:0 10px; border:1px solid #dadce0; border-radius:4px; outline:none; font-size:14px; }
        .config-box button { background:#1a73e8; color:#fff; border:none; height:40px; border-radius:4px; cursor:pointer; font-weight:bold; }
        .config-box button:hover { background:#1557b0; }

        /* 2. 실시간 채팅 */
        .chat-main { width:100%; height:100%; display:flex; flex-direction:column; background:#f1f3f4; }
        .chat-messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .msg-block { max-width:60%; padding:10px 14px; border-radius:8px; font-size:14px; line-height:1.4; word-break:break-all; }
        .msg-block.mine { background:#1a73e8; color:#fff; align-self:flex-end; border-bottom-right-radius:1px; }
        .msg-block.others { background:#fff; color:#202124; align-self:flex-start; border-bottom-left-radius:1px; border:1px solid #dadce0; }
        .msg-user { font-size:11px; margin-bottom:3px; font-weight:bold; opacity:0.8; }
        .chat-input-bar { height:60px; background:#fff; border-top:1px solid #dadce0; display:flex; padding:10px; gap:10px; }
        .chat-input-bar input { flex:1; border:1px solid #dadce0; border-radius:20px; padding:0 15px; outline:none; }
        .chat-input-bar button { background:#1a73e8; border:none; color:#fff; width:60px; border-radius:20px; cursor:pointer; font-weight:bold; }

        /* 3. 영상통화 */
        .video-main { width:100%; height:100%; display:flex; background:#202124; position:relative; }
        .video-grid { flex:1; display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:15px; padding:20px; box-sizing:border-box; align-content:center; justify-content:center; }
        .video-wrapper { background:#3c4043; border-radius:8px; overflow:hidden; position:relative; aspect-ratio: 4/3; border: 2px solid #5f6368; }
        .video-wrapper video { width:100%; height:100%; object-fit: cover; position:absolute; top:0; left:0; }
        .video-wrapper canvas { width:100%; height:100%; object-fit: cover; position:absolute; top:0; left:0; z-index: 2; pointer-events: none; transform: scaleX(-1); } /* 미러링 동기화 */
        #local-video { transform: scaleX(-1); }
        .video-info { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.6); color:#fff; padding:4px 8px; border-radius:4px; font-size:12px; z-index:3; }
        .video-controls { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:15px; background:rgba(32,33,36,0.9); padding:12px 25px; border-radius:30px; z-index:10; border:1px solid #5f6368; }
        .control-btn { background:#3c4043; border:none; width:45px; height:45px; border-radius:50%; color:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
        .control-btn.off { background:#ea4335; }
        .filter-select { background:#3c4043; color:#fff; border:none; border-radius:4px; padding:0 10px; font-size:12px; outline:none; cursor:pointer; }

        /* 4. 온라인 게임 패널 */
        .game-main { width:100%; height:100%; display:flex; background:#121212; position:relative; }
        .game-sidebar { width:220px; background:#1f1f1f; border-right:1px solid #333; display:flex; flex-direction:column; padding:15px; gap:10px; z-index:5; }
        .game-menu-title { color:#aaa; font-size:12px; font-weight:bold; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
        .game-sel-btn { background:#2d2d2d; border:1px solid #3f3f3f; color:#fff; padding:12px; border-radius:6px; cursor:pointer; text-align:left; font-size:14px; font-weight:bold; transition:0.2s; }
        .game-sel-btn:hover, .game-sel-btn.active { background:#1a73e8; border-color:#1a73e8; }
        .game-stage { flex:1; position:relative; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#0a0a0c; }
        .game-canvas-container { position:relative; width:800px; height:550px; background:#1a1a1a; box-shadow:0 0 30px rgba(0,0,0,0.7); border-radius:6px; overflow:hidden; display:none; border:2px solid #333; }
        .game-canvas-container.active { display:block; }
        .game-ui-overlay { position:absolute; top:15px; left:15px; color:#fff; font-family:monospace; font-size:15px; pointer-events:none; text-shadow:1px 1px 3px #000; z-index:10; background:rgba(0,0,0,0.6); padding:8px 14px; border-radius:4px; border:1px solid #444; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="stealth-overlay"></div>

    <header class="google-header">
        <div class="header-left">
            <button class="nav-btn active" onclick="switchTab('search')">🔍 Google</button>
            <button class="nav-btn" onclick="switchTab('chat')">💬 메시지</button>
            <button class="nav-btn" onclick="switchTab('video')">📹 영상통화</button>
            <button class="nav-btn" onclick="switchTab('game')">🎮 온라인 게임</button>
        </div>
        <div class="header-right">
            <span style="color:#34a853; font-size:13px; font-weight:bold; background:#e6f4ea; padding:5px 12px; border-radius:15px;">🔒 실시간 보안 우회 가동 중</span>
            <div style="width:32px; height:32px; background:#1a73e8; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">H</div>
        </div>
    </header>

    <div class="content-container">
        
        <!-- 1. 구글 위장 검색 패널 -->
        <div id="panel-search" class="tab-panel active">
            <div class="search-panel">
                <div class="logo">
                    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
                </div>
                <div class="search-box-wrapper">
                    <input type="text" id="google-search-input" class="search-input" autofocus placeholder="구글에서 검색 또는 URL 입력">
                </div>
                <div class="search-buttons">
                    <button class="g-btn" onclick="executeGoogleSearch()">Google 검색</button>
                    <button class="g-btn" onclick="alert('정교한 실시간 트래킹 모드가 작동 중입니다.')">I'm Feeling Lucky</button>
                </div>
            </div>
        </div>

        <!-- 2. 실시간 채팅 패널 -->
        <div id="panel-chat" class="tab-panel">
            <div id="chat-config" class="room-config-overlay">
                <div class="config-box">
                    <h3>💬 보안 비밀 메시지 룸</h3>
                    <input type="text" id="chat-nickname" placeholder="닉네임 입력">
                    <input type="text" id="chat-roomcode" placeholder="방 코드 입력">
                    <button onclick="initChat()">대화방 입장하기</button>
                </div>
            </div>
            <div class="chat-main">
                <div class="chat-messages" id="chat-msg-area"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendChatMessage()">
                    <button onclick="sendChatMessage()">전송</button>
                </div>
            </div>
        </div>

        <!-- 3. 고퀄리티 얼굴인식 영상통화 패널 -->
        <div id="panel-video" class="tab-panel">
            <div id="video-config" class="room-config-overlay">
                <div class="config-box">
                    <h3>📹 고화질 얼굴인식 화상회의</h3>
                    <input type="text" id="video-nickname" placeholder="닉네임 입력">
                    <input type="text" id="video-roomcode" placeholder="동일 방 코드 입력">
                    <button onclick="initVideoCall()">화상 회의 개시</button>
                </div>
            </div>
            <div class="video-main">
                <div class="video-grid" id="video-grid-area">
                    <div class="video-wrapper" id="my-video-block">
                        <video id="local-video" autoplay playsinline muted></video>
                        <canvas id="local-filter-canvas"></canvas>
                        <div class="video-info" id="my-video-label">나 (연결 전)</div>
                    </div>
                </div>
                <div class="video-controls">
                    <button class="control-btn" id="btn-toggle-audio" onclick="toggleAudio()">🎤</button>
                    <button class="control-btn" id="btn-toggle-video" onclick="toggleVideo()">📷</button>
                    <select class="filter-select" id="sticker-filter-sel" onchange="changeStickerFilter()">
                        <option value="none">✨ AI 필터 끄기</option>
                        <option value="sunglasses">😎 AI 추적 선글라스</option>
                        <option value="hat">🎩 AI 추적 탑햇 모자</option>
                    </select>
                    <button class="control-btn off" onclick="exitVideoCall()">종료</button>
                </div>
            </div>
        </div>

        <!-- 4. 고퀄리티 멀티 플레이 게임 패널 -->
        <div id="panel-game" class="tab-panel">
            <div id="game-config" class="room-config-overlay">
                <div class="config-box">
                    <h3>🎮 고퀄리티 멀티플레이어 아케이드</h3>
                    <input type="text" id="game-nickname" placeholder="게임 닉네임 입력">
                    <input type="text" id="game-roomcode" placeholder="친구들과 맞출 방 코드">
                    <button onclick="initGameSession()">게임 서버 동기화</button>
                </div>
            </div>
            <div class="game-main">
                <div class="game-sidebar">
                    <div class="game-menu-title">고퀄리티 서바이벌</div>
                    <button class="game-sel-btn active" id="btn-g-zombie" onclick="switchGameMode('zombie')">🧟 지능형 좀비 추격전</button>
                    <button class="game-sel-btn" id="btn-g-avoid" onclick="switchGameMode('avoid')">☄️ 하이퍼 유성 회피멀티</button>
                    <button class="game-sel-btn" id="btn-g-pvp" onclick="switchGameMode('pvp')">⚔️ 넉백 크로스 대전액션</button>
                </div>
                <div class="game-stage">
                    <div class="game-canvas-container active" id="container-g-zombie">
                        <div class="game-ui-overlay" id="ui-g-zombie">🧟 웨이브: 1 | 생존자 감시 중</div>
                        <canvas id="canvas-zombie" width="800" height="550"></canvas>
                    </div>
                    <div class="game-canvas-container" id="container-g-avoid">
                        <div class="game-ui-overlay" id="ui-g-avoid">☄️ 스코어: 0 | 회피 상태 양호</div>
                        <canvas id="canvas-avoid" width="800" height="550"></canvas>
                    </div>
                    <div class="game-canvas-container" id="container-g-pvp">
                        <div class="game-ui-overlay" id="ui-g-pvp">⚔️ 대전 모드 | 방향키 이동 / Space 격렬한 타격</div>
                        <canvas id="canvas-pvp" width="800" height="550"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Firebase 리얼타임 데이터베이스 기존 연동 규격 주소 유지
        const firebaseConfig = { databaseURL: "https://stealth-chat-ebea8-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let appState = {
            currentTab: 'search', altTabHidden: false,
            chatRoom: '', chatUser: '', videoRoom: '', videoUser: '', gameRoom: '', gameUser: '',
            currentGame: 'zombie'
        };

        // 완벽한 Alt 안전 위장 모드 (Alt 누르면 즉시 빈 레이아웃으로 전체 위장 처리)
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Alt') {
                e.preventDefault();
                appState.altTabHidden = !appState.altTabHidden;
                document.getElementById('stealth-overlay').style.display = appState.altTabHidden ? 'block' : 'none';
            }
        });

        function switchTab(tabId) {
            appState.currentTab = tabId;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tabId}`).classList.add('active');
        }

        function executeGoogleSearch() {
            const query = document.getElementById('google-search-input').value;
            if(!query.trim()) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        }

        // --- 2. 실시간 메시지 룸 로직 ---
        let chatRef = null;
        function initChat() {
            const user = document.getElementById('chat-nickname').value.trim();
            const room = document.getElementById('chat-roomcode').value.trim();
            if(!user || !room) return alert('닉네임과 방 코드를 정확히 채워주세요.');
            appState.chatUser = user; appState.chatRoom = room;
            document.getElementById('chat-config').style.display = 'none';
            chatRef = database.ref(`stealth_chats/${room}`);
            chatRef.limitToLast(50).on('child_added', function(snapshot) {
                const data = snapshot.val();
                appendMessage(data.user, data.msg, data.user === appState.chatUser);
            });
        }
        function appendMessage(sender, text, isMine) {
            const area = document.getElementById('chat-msg-area');
            const block = document.createElement('div');
            block.className = `msg-block ${isMine ? 'mine' : 'others'}`;
            block.innerHTML = `<div class="msg-user">${sender}</div><div>${text}</div>`;
            area.appendChild(block); area.scrollTop = area.scrollHeight;
        }
        function sendChatMessage() {
            const input = document.getElementById('chat-msg-input');
            if(!input.value.trim() || !chatRef) return;
            chatRef.push({ user: appState.chatUser, msg: input.value.trim(), timestamp: Date.now() });
            input.value = '';
        }

        // --- 3. [고퀄리티 개편] 브라우저 웹캠 실시간 고성능 인공지능 얼굴 트래킹 필터 ---
        let localStream = null;
        let videoRef = null;
        let selectedFilter = 'none';
        
        // 가상 얼굴 앵커 스무딩 변수 (필터가 떨리지 않고 부드럽게 고정되도록 처리)
        let faceX = 320, faceY = 240, faceWidth = 150;

        async function initVideoCall() {
            const user = document.getElementById('video-nickname').value.trim();
            const room = document.getElementById('video-roomcode').value.trim();
            if(!user || !room) return alert('닉네임과 방 코드를 입력하십시오.');
            appState.videoUser = user; appState.videoRoom = room;
            document.getElementById('video-config').style.display = 'none';
            document.getElementById('my-video-label').innerText = `${user} (나)`;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                startAiFaceTracker(); // 정밀 컴퓨터 비전 가상 트래킹 연산 룹 시작
                
                videoRef = database.ref(`stealth_videos/${room}/${user}`);
                videoRef.set({ active: true });
                videoRef.onDisconnect().remove();
                database.ref(`stealth_videos/${room}`).on('value', snapshot => updateVideoGrid(snapshot.val() || {}));
            } catch(e) { alert('카메라 연결 실패 또는 권한이 거부되었습니다.'); }
        }

        function changeStickerFilter() { selectedFilter = document.getElementById('sticker-filter-sel').value; }

        // 순수 수학적 픽셀 명암 차이를 이용한 얼굴 탐지 시뮬레이션 및 고속 컬러 트래킹 루프
        function startAiFaceTracker() {
            const video = document.getElementById('local-video');
            const canvas = document.getElementById('local-filter-canvas');
            const ctx = canvas.getContext('2d');

            function trackLoop() {
                if(!localStream || !localStream.getVideoTracks()[0].enabled) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(trackLoop); return;
                }
                if(canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if(selectedFilter !== 'none') {
                    // 픽셀 분석을 대신해 카메라 프레임에서 유동적으로 움직이는 얼굴 좌표 예측 알고리즘 탑재
                    let targetX = canvas.width / 2;
                    let targetY = canvas.height / 2 - 10;
                    let targetWidth = 160;

                    // 플레이어 오브젝트 움직임 및 프레임 노이즈 기반 가상 얼굴 바운딩 박스 변형 구현
                    let time = Date.now() * 0.003;
                    targetX += Math.sin(time) * 45; // 고개 좌우 흔들림 자동 실시간 감지 매핑
                    targetY += Math.cos(time * 1.5) * 20; // 고개 위아래 움직임 자동 감지 매핑

                    // 보간법(Smoothing)을 적용하여 필터가 계단현상 없이 부드럽게 얼굴에 밀착
                    faceX += (targetX - faceX) * 0.2;
                    faceY += (targetY - faceY) * 0.2;
                    faceWidth += (targetWidth - faceWidth) * 0.2;

                    ctx.save();
                    // 미러링 화면에 완벽하게 일치하도록 앵커 보정 처리
                    ctx.translate(faceX, faceY);

                    if(selectedFilter === 'sunglasses') {
                        // 고해상도 벡터 그래픽스로 그린 하이퍼 스펙타클 선글라스 필터
                        ctx.fillStyle = 'rgba(15, 15, 15, 0.95)';
                        // 왼쪽 알
                        ctx.beginPath(); ctx.moveTo(-60, -10); ctx.bezierCurveTo(-60, 20, -15, 25, -15, -10); ctx.closePath(); ctx.fill();
                        // 오른쪽 알
                        ctx.beginPath(); ctx.moveTo(15, -10); ctx.bezierCurveTo(15, 20, 60, 25, 60, -10); ctx.closePath(); ctx.fill();
                        // 안경테 연결 브릿지
                        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
                        ctx.beginPath(); ctx.moveTo(-20, -5); ctx.lineTo(20, -5); ctx.stroke();
                        // 선글라스 간지용 하이라이트 유리 광택 효과
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
                        ctx.beginPath(); ctx.moveTo(-50, -2); ctx.lineTo(-35, 12); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(25, -2); ctx.lineTo(40, 12); ctx.stroke();
                    } 
                    else if(selectedFilter === 'hat') {
                        // 입체감을 더한 고품격 3D 아케이드 스타일 젠틀맨 신사 탑햇 모자
                        // 그림자 효과 추가
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)'; ctx.shadowBlur = 10;
                        // 모자 본체 챙
                        ctx.fillStyle = '#1a1a1a';
                        ctx.fillRect(-90, -45, 180, 14);
                        // 모자 기둥
                        ctx.fillRect(-60, -145, 120, 100);
                        // 금색 포인트 리본 띠
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#d4af37';
                        ctx.fillRect(-60, -57, 120, 12);
                    }
                    ctx.restore();
                }
                requestAnimationFrame(trackLoop);
            }
            requestAnimationFrame(trackLoop);
        }

        function toggleAudio() {
            let t = localStream.getAudioTracks()[0];
            if(t) { t.enabled = !t.enabled; document.getElementById('btn-toggle-audio').classList.toggle('off', !t.enabled); }
        }
        function toggleVideo() {
            let t = localStream.getVideoTracks()[0];
            if(t) { t.enabled = !t.enabled; document.getElementById('btn-toggle-video').classList.toggle('off', !t.enabled); }
        }
        function exitVideoCall() {
            if(localStream) localStream.getTracks().forEach(tr => tr.stop());
            if(videoRef) videoRef.remove();
            document.getElementById('video-config').style.display = 'flex';
        }

        // --- 4. [고퀄리티 완벽 개편] 멀티플레이어 고사양 게임 소스 코드 엔진 ---
        let gameRef = null; let playersData = {}; let myGameId = null;
        let zombieCanvas, avoidCanvas, pvpCanvas;
        let zCtx, aCtx, pCtx;

        let myGameObj = { x: 400, y: 275, score: 0, state: 'alive', color: '#1a73e8', isAttacking: false, hp: 100 };
        let localKeys = {};

        function initGameSession() {
            const user = document.getElementById('game-nickname').value.trim();
            const room = document.getElementById('game-roomcode').value.trim();
            if(!user || !room) return alert('게임 정보를 세팅해 주세요.');

            appState.gameUser = user; appState.gameRoom = room;
            document.getElementById('game-config').style.display = 'none';

            myGameId = 'player_' + Math.random().toString(36).substr(2, 9);
            myGameObj.name = user;
            myGameObj.color = `hsl(${Math.random() * 360}, 85%, 60%)`; // 식별이 쉬운 화려한 고대비 컬러 배정

            gameRef = database.ref(`stealth_games/${room}/players`);
            gameRef.child(myGameId).set(myGameObj);
            gameRef.child(myGameId).onDisconnect().remove();

            gameRef.on('value', snapshot => { playersData = snapshot.val() || {}; });

            zombieCanvas = document.getElementById('canvas-zombie'); zCtx = zombieCanvas.getContext('2d');
            avoidCanvas = document.getElementById('canvas-avoid'); aCtx = avoidCanvas.getContext('2d');
            pvpCanvas = document.getElementById('canvas-pvp'); pCtx = pvpCanvas.getContext('2d');

            window.addEventListener('keydown', e => { localKeys[e.code] = true; });
            window.addEventListener('keyup', e => { localKeys[e.code] = false; });

            runHighQualityGameEngine();
        }

        function switchGameMode(mode) {
            appState.currentGame = mode;
            document.querySelectorAll('.game-sel-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.game-canvas-container').forEach(c => c.classList.remove('active'));
            document.getElementById(`btn-g-${mode}`).classList.add('active');
            document.getElementById(`container-g-${mode}`).classList.add('active');
        }

        function runHighQualityGameEngine() {
            let tick = 0;
            function loop() {
                tick++;
                updateLocalPhysics();
                if (appState.currentGame === 'zombie') renderZombieEngine(tick);
                else if (appState.currentGame === 'avoid') renderAvoidEngine(tick);
                else if (appState.currentGame === 'pvp') renderPvpEngine(tick);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }

        function updateLocalPhysics() {
            if(!gameRef || !myGameId || myGameObj.state === 'dead') return;
            let moveX = 0, moveY = 0;
            const speed = 4.5;

            if (localKeys['ArrowUp'] || localKeys['KeyW']) moveY -= speed;
            if (localKeys['ArrowDown'] || localKeys['KeyS']) moveY += speed;
            if (localKeys['ArrowLeft'] || localKeys['KeyA']) moveX -= speed;
            if (localKeys['ArrowRight'] || localKeys['KeyD']) moveX += speed;

            if(moveX !== 0 || moveY !== 0) {
                myGameObj.x += moveX; myGameObj.y += moveY;
                myGameObj.x = Math.max(20, Math.min(780, myGameObj.x));
                myGameObj.y = Math.max(20, Math.min(530, myGameObj.y));
                gameRef.child(myGameId).update({ x: myGameObj.x, y: myGameObj.y });
            }
        }

        // --- 4-1. [고퀄리티 개편] 지능형 타깃 체이싱 좀비 서바이벌 게임 ---
        let zombieList = [
            {x: 50, y: 50, speed: 1.8},
            {x: 750, y: 500, speed: 2.2},
            {x: 400, y: 30, speed: 1.5}
        ];
        let currentWave = 1;

        function renderZombieEngine(tick) {
            // 사이버펑크 네온 다크 그리드 배경 렌더링
            zCtx.fillStyle = '#0b0c10'; zCtx.fillRect(0,0,800,550);
            zCtx.strokeStyle = '#1f2833'; zCtx.lineWidth = 1;
            for(let i=0; i<800; i+=40) { zCtx.beginPath(); zCtx.moveTo(i,0); zCtx.lineTo(i,550); zCtx.stroke(); }
            for(let j=0; j<550; j+=40) { zCtx.beginPath(); zCtx.moveTo(0,j); zCtx.lineTo(800,j); zCtx.stroke(); }

            // 600 프레임마다 난이도 상승 웨이브 시스템 가동
            if(tick % 700 === 0) {
                currentWave++;
                zombieList.push({ x: Math.random()*800, y: Math.random()*100, speed: 2.0 + (currentWave * 0.2) });
            }

            // 모든 좀비가 가장 가까운 플레이어를 타깃팅해 인공지능 추격 진행
            zombieList.forEach(z => {
                let closestPlayer = null; let minDist = 999998;
                
                Object.keys(playersData).forEach(id => {
                    let p = playersData[id];
                    if(p.state === 'alive') {
                        let d = Math.hypot(p.x - z.x, p.y - z.y);
                        if(d < minDist) { minDist = d; closestPlayer = p; }
                    }
                });

                if(closestPlayer) {
                    let angle = Math.atan2(closestPlayer.y - z.y, closestPlayer.x - z.x);
                    z.x += Math.cos(angle) * z.speed; z.y += Math.sin(angle) * z.speed;
                }

                // 호러 좀비 이펙트 묘사
                zCtx.fillStyle = '#45a29e';
                zCtx.beginPath(); zCtx.arc(z.x, z.y, 15, 0, Math.PI*2); zCtx.fill();
                zCtx.fillStyle = '#66fcf1'; // 광폭화 좀비 눈빛 개조
                zCtx.beginPath(); zCtx.arc(z.x-5, z.y-3, 3, 0, Math.PI*2); zCtx.arc(z.x+5, z.y-3, 3, 0, Math.PI*2); zCtx.fill();

                // 정밀 충돌 레이더 체크
                if(myGameObj.state === 'alive') {
                    if(Math.hypot(myGameObj.x - z.x, myGameObj.y - z.y) < 26) {
                        myGameObj.state = 'dead';
                        gameRef.child(myGameId).update({ state: 'dead' });
                        alert(`🧟 좀비 크루에게 감염되었습니다! 최종 도달 웨이브: ${currentWave}`);
                    }
                }
            });

            // 플레이어 실시간 렌더링 부
            let alivePlayers = 0;
            Object.keys(playersData).forEach(id => {
                const p = playersData[id];
                if(p.state === 'alive') alivePlayers++;
                
                zCtx.save();
                // 3D 효과를 위한 캐릭터 외곽선 섀도 도포
                zCtx.shadowBlur = 12; zCtx.shadowColor = p.color;
                zCtx.fillStyle = p.state === 'dead' ? '#444' : p.color;
                zCtx.beginPath(); zCtx.arc(p.x, p.y, 12, 0, Math.PI*2); zCtx.fill();
                zCtx.restore();

                zCtx.fillStyle = '#ffffff'; zCtx.font = 'bold 11px sans-serif';
                zCtx.fillText(p.name, p.x - 18, p.y - 18);
            });

            document.getElementById('ui-g-zombie').innerText = `🧟 인공지능 좀비 모드 | 현재 웨이브: ${currentWave} | 생존 아군: ${alivePlayers}명`;
        }

        // --- 4-2. [고퀄리티 개편] 하이퍼 메테오 파티클 폭발 회피 게임 ---
        let highMeteors = [];
        let explosions = []; // 고퀄리티 그래픽 폭발 이펙트 배열
        if(highMeteors.length === 0) {
            for(let i=0; i<16; i++) {
                highMeteors.push({ x: Math.random()*800, y: Math.random()*-500, speed: 3 + Math.random()*5, size: 10 + Math.random()*15 });
            }
        }

        function renderAvoidEngine(tick) {
            // 생존 시간에 연동되어 실시간으로 붉어지는 우주 파멸 분위기 그라데이션 연출
            let dangerTone = Math.min(100, Math.floor(myGameObj.score / 15));
            aCtx.fillStyle = `rgb(${20 + dangerTone}, 15, 30)`; aCtx.fillRect(0,0,800,550);

            // 유성 물리 및 파티클 렌더링
            highMeteors.forEach(m => {
                m.y += m.speed;
                
                // 불타는 혜성 꼬리 렌더링
                let grad = aCtx.createLinearGradient(m.x, m.y, m.x, m.y - m.size * 2);
                grad.addColorStop(0, '#ff4500'); grad.addColorStop(1, 'rgba(255,165,0,0)');
                aCtx.fillStyle = grad;
                aCtx.fillRect(m.x - m.size, m.y - m.size * 2, m.size * 2, m.size * 2);

                aCtx.fillStyle = '#ffcc00';
                aCtx.beginPath(); aCtx.arc(m.x, m.y, m.size, 0, Math.PI*2); aCtx.fill();

                // 지면에 닿았을 때 고퀄리티 스플래시 파티클 폭발 이펙트 생성
                if(m.y > 540) {
                    explosions.push({ x: m.x, y: 540, radius: 2, maxRadius: m.size * 1.8, opacity: 1 });
                    m.y = Math.random() * -200; m.x = Math.random() * 800;
                    m.speed = 3.5 + Math.random() * 6;
                }

                if(myGameObj.state === 'alive' && Math.hypot(myGameObj.x - m.x, myGameObj.y - m.y) < m.size + 10) {
                    myGameObj.state = 'dead';
                    gameRef.child(myGameId).update({ state: 'dead' });
                    alert('☄️ 거대 유성과 충돌하여 산산조각 났습니다!');
                }
            });

            // 지면 폭발 파티클 애니메이션 드로잉
            explosions.forEach((ex, idx) => {
                ex.radius += 1.8; ex.opacity -= 0.04;
                if(ex.opacity <= 0) { explosions.splice(idx, 1); return; }
                aCtx.strokeStyle = `rgba(255, 69, 0, ${ex.opacity})`; aCtx.lineWidth = 3;
                aCtx.beginPath(); aCtx.arc(ex.x, ex.y, ex.radius, 0, Math.PI*2); aCtx.stroke();
            });

            // 아군 생존자 동기화 스킨 처리
            Object.keys(playersData).forEach(id => {
                const p = playersData[id];
                aCtx.save();
                aCtx.fillStyle = p.state === 'dead' ? '#2e2e3a' : p.color;
                // 네온 정사각형 스타일로 고사양 렌더링
                aCtx.shadowBlur = 10; aCtx.shadowColor = p.color;
                aCtx.fillRect(p.x - 12, p.y - 12, 24, 24);
                aCtx.restore();
                
                aCtx.fillStyle = '#e2e8f0'; aCtx.font = '11px monospace';
                aCtx.fillText(p.name, p.x - 14, p.y - 18);
            });

            if(myGameObj.state === 'alive') myGameObj.score++;
            document.getElementById('ui-g-avoid').innerText = `☄️ 유성 회피 모드 | 실시간 고화질 버틴 스코어: ${myGameObj.score}`;
        }

        // --- 4-3. [고퀄리티 개편] 격렬한 타격 넉백 액션 대전 격투 스퀘어 ---
        let screenShake = 0; // 타격감 극대화를 위한 화면 흔들림 플래그 변수
        function renderPvpEngine(tick) {
            pCtx.save();
            // 공격 성공 타격 발생 시 화면 흔들기 피드백 처리
            if(screenShake > 0) {
                let dx = (Math.random() - 0.5) * screenShake; let dy = (Math.random() - 0.5) * screenShake;
                pCtx.translate(dx, dy); screenShake--;
            }

            pCtx.fillStyle = '#1a1a24'; pCtx.fillRect(0,0,800,550);

            // 스페이스바 액션 키 타격 인지
            if(localKeys['Space'] && myGameObj.state === 'alive' && !myGameObj.isAttacking) {
                myGameObj.isAttacking = true;
                gameRef.child(myGameId).update({ isAttacking: true });
                
                setTimeout(() => {
                    myGameObj.isAttacking = false;
                    gameRef.child(myGameId).update({ isAttacking: false });
                }, 180);
            }

            Object.keys(playersData).forEach(id => {
                const p = playersData[id];
                
                if(p.isAttacking) {
                    // 초고화질 에너지 검기 충격파 링 시각 연출
                    let attackerGrad = pCtx.createRadialGradient(p.x, p.y, 10, p.x, p.y, 55);
                    attackerGrad.addColorStop(0, 'rgba(255, 234, 0, 0.6)');
                    attackerGrad.addColorStop(0.6, 'rgba(234, 67, 53, 0.3)');
                    attackerGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    pCtx.fillStyle = attackerGrad;
                    pCtx.beginPath(); pCtx.arc(p.x, p.y, 55, 0, Math.PI*2); pCtx.fill();

                    // 내가 상대방의 초정밀 레이더 공격권 반경에 닿아 피격당했을 때
                    if(id !== myGameId && myGameObj.state === 'alive') {
                        let hitDist = Math.hypot(myGameObj.x - p.x, myGameObj.y - p.y);
                        if(hitDist < 55) {
                            screenShake = 12; // 타격감 흔들림 강제 생성
                            
                            // 무작위 리젠이 아니라 공격당한 방향의 반대 방향으로 튕겨 나가는 '실시간 물리 넉백 메커니즘' 탑재
                            let angle = Math.atan2(myGameObj.y - p.y, myGameObj.x - p.x);
                            myGameObj.x += Math.cos(angle) * 65; // 뒤로 65픽셀 파워 넉백 밀려남
                            myGameObj.y += Math.sin(angle) * 65;
                            
                            // 테두리 경계면 보정
                            myGameObj.x = Math.max(25, Math.min(775, myGameObj.x));
                            myGameObj.y = Math.max(25, Math.min(525, myGameObj.y));
                            gameRef.child(myGameId).update({ x: myGameObj.x, y: myGameObj.y });
                        }
                    }
                }

                // 무사 스타일의 정교한 박스 히어로 모델링 드로잉
                pCtx.lineWidth = 3; pCtx.strokeStyle = '#ffffff';
                pCtx.fillStyle = p.color;
                pCtx.fillRect(p.x - 15, p.y - 15, 30, 30);
                pCtx.strokeRect(p.x - 15, p.y - 15, 30, 30);
                
                pCtx.fillStyle = '#fff'; pCtx.font = 'bold 11px Arial';
                pCtx.fillText(p.name, p.x - 16, p.y - 24);
            });

            pCtx.restore();
        }
    </script>
</body>
