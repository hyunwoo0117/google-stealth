<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<link rel="icon" href="https://www.google.com/favicon.ico">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:arial,sans-serif; }
  body { background:#fff; height:100vh; overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100vh; }
  #topbar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; border-bottom:1px solid #e0e0e0; background:#fff; flex-shrink:0; }
  #topbar-left { display:flex; align-items:center; gap:24px; }
  #topbar-left a { font-size:13px; color:#202124; text-decoration:none; }
  .g-b{color:#4285F4}.g-r{color:#EA4335}.g-y{color:#FBBC05}.g-g{color:#34A853}
  .g-logo { font-size:22px; font-weight:700; letter-spacing:-1px; }
  .btn-signin { background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:8px 16px;font-size:14px;cursor:pointer; }
  #tabs { display:flex; border-bottom:1px solid #e0e0e0; flex-shrink:0; }
  .tab { padding:10px 20px;font-size:13px;cursor:pointer;color:#5f6368;border-bottom:2px solid transparent;user-select:none; }
  .tab.active { color:#1a73e8;border-bottom:2px solid #1a73e8;font-weight:500; }
  .tab:hover { background:#f1f3f4; }
  .panel { flex:1;overflow-y:auto;display:none;flex-direction:column;min-height:0; }
  .panel.active { display:flex; }

  /* Search */
  #search-hero { display:flex;flex-direction:column;align-items:center;padding:80px 20px 20px;gap:20px; }
  .big-logo { font-size:72px;font-weight:700;letter-spacing:-4px;line-height:1; }
  #search-box-wrap { display:flex;align-items:center;width:100%;max-width:580px;border:1px solid #dfe1e5;border-radius:24px;padding:10px 16px;box-shadow:0 1px 3px rgba(0,0,0,.1);gap:10px; }
  #search-box-wrap:focus-within { box-shadow:0 1px 6px rgba(0,0,0,.2); }
  #search-input { flex:1;border:none;outline:none;font-size:16px;color:#202124; }
  .search-btns { display:flex;gap:10px;margin-top:4px; }
  .g-btn { background:#f8f9fa;border:1px solid #f8f9fa;border-radius:4px;padding:9px 23px;font-size:14px;color:#3c4043;cursor:pointer; }
  .g-btn:hover { border-color:#dadce0; }

  /* Chat */
  #room-setup { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px; }
  .room-input-wrap { display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px; }
  .room-input-wrap input { border:1px solid #dfe1e5;border-radius:4px;padding:10px 14px;font-size:14px;outline:none; }
  .room-input-wrap input:focus { border-color:#1a73e8; }
  .room-btn { background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:10px;font-size:14px;cursor:pointer; }
  .room-desc { font-size:13px;color:#5f6368;text-align:center;max-width:300px;line-height:1.6; }
  #chat-ui { display:none;flex:1;flex-direction:column;min-height:0; }
  #chat-ui.show { display:flex; }
  #chat-header { padding:12px 20px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px;flex-shrink:0; }
  #chat-room-info { flex:1; }
  #chat-room-name { font-size:15px;font-weight:500;color:#202124; }
  #chat-status { font-size:12px;color:#34a853;margin-top:2px; }
  #leave-btn { font-size:12px;color:#ea4335;background:none;border:1px solid #ea4335;border-radius:4px;padding:4px 10px;cursor:pointer; }
  #messages { flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:6px; }
  .msg-row { display:flex;flex-direction:column; }
  .msg-row.me { align-items:flex-end; }
  .bubble { max-width:65%;padding:8px 14px;border-radius:18px;font-size:14px;line-height:1.5;background:#f1f3f4;color:#202124;border-bottom-left-radius:4px; }
  .msg-row.me .bubble { background:#1a73e8;color:#fff;border-bottom-left-radius:18px;border-bottom-right-radius:4px; }
  .msg-meta { font-size:11px;color:#9aa0a6;margin-top:2px;padding:0 4px; }
  .msg-row.me .msg-meta { text-align:right; }
  .sys-msg { text-align:center;font-size:12px;color:#9aa0a6;padding:6px 0; }
  #chat-input-row { display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid #e0e0e0;flex-shrink:0; }
  #msg-input { flex:1;border:1px solid #dfe1e5;border-radius:24px;padding:10px 16px;font-size:14px;outline:none; }
  #msg-input:focus { border-color:#1a73e8; }
  #send-btn { background:#1a73e8;color:#fff;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center; }

  /* Video Call */
  #video-setup { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px; }
  #video-ui { display:none;flex:1;flex-direction:column;min-height:0;background:#202124; }
  #video-ui.show { display:flex; }
  #video-grid { flex:1;display:flex;flex-wrap:wrap;gap:4px;padding:4px;align-content:center;justify-content:center;overflow:hidden; }
  .video-tile { position:relative;background:#3c4043;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center; }
  .video-tile video { width:100%;height:100%;object-fit:cover; }
  .video-tile .name-tag { position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:2px 8px;border-radius:4px; }
  .video-tile .no-video { font-size:40px;color:#9aa0a6; }
  #video-controls { display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;flex-shrink:0;background:#202124; }
  .ctrl-btn { width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px; }
  .ctrl-btn.red { background:#ea4335; }
  .ctrl-btn.gray { background:#3c4043; }
  .ctrl-btn.gray.off { background:#ea4335; }
  #video-header { display:flex;align-items:center;justify-content:space-between;padding:12px 20px;flex-shrink:0;background:#202124; }
  #video-room-name { color:#fff;font-size:14px; }
  #video-status { color:#34a853;font-size:12px; }

  #hidden-overlay { display:none;position:fixed;inset:0;background:#fff;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:10px; }
  #hidden-overlay.show { display:flex; }
  #hidden-overlay .emoji { font-size:52px; }
  #hidden-overlay p { font-size:15px;color:#5f6368; }
  #hidden-overlay small { font-size:13px;color:#9aa0a6; }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;border-radius:6px;padding:10px 20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:999; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <span class="g-logo"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span></span>
      <a href="#">소개</a><a href="#">스토어</a>
    </div>
    <div><button class="btn-signin">로그인</button></div>
  </div>
  <div id="tabs">
    <div class="tab active" onclick="switchTab('search')">🔍 검색</div>
    <div class="tab" onclick="switchTab('chat')">💬 메시지</div>
    <div class="tab" onclick="switchTab('video')">📹 영상통화</div>
  </div>

  <!-- Search -->
  <div id="panel-search" class="panel active">
    <div id="search-hero">
      <div class="big-logo"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span></div>
      <div id="search-box-wrap">
        <svg width="20" height="20" fill="#9aa0a6" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Google 검색 또는 URL 입력" />
      </div>
      <div class="search-btns">
        <button class="g-btn" onclick="doSearch()">Google 검색</button>
        <button class="g-btn" onclick="doSearch()">I'm Feeling Lucky</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="panel-chat" class="panel">
    <div id="room-setup">
      <div class="big-logo" style="font-size:36px;"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span> <span style="font-size:16px;font-weight:400;color:#5f6368;">메시지</span></div>
      <p class="room-desc">친구와 <b>같은 방 코드</b>를 입력하면<br>실시간 채팅 가능해요 😊</p>
      <div class="room-input-wrap">
        <input type="text" id="input-nick" placeholder="닉네임 (예: 현우)" maxlength="10" />
        <input type="text" id="input-room" placeholder="방 코드 (예: soccer123)" maxlength="30" />
        <button class="room-btn" onclick="joinRoom()">입장하기</button>
      </div>
    </div>
    <div id="chat-ui">
      <div id="chat-header">
        <div id="chat-room-info">
          <div id="chat-room-name"></div>
          <div id="chat-status">연결됨 ✓</div>
        </div>
        <button id="leave-btn" onclick="leaveRoom()">나가기</button>
      </div>
      <div id="messages"></div>
      <div id="chat-input-row">
        <input type="text" id="msg-input" placeholder="메시지 입력..." />
        <button id="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <!-- Video -->
  <div id="panel-video" class="panel">
    <div id="video-setup">
      <div class="big-logo" style="font-size:36px;"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span> <span style="font-size:16px;font-weight:400;color:#5f6368;">영상통화</span></div>
      <p class="room-desc">친구와 <b>같은 방 코드</b>를 입력하면<br>영상통화가 시작돼요 📹</p>
      <div class="room-input-wrap">
        <input type="text" id="v-nick" placeholder="닉네임 (예: 현우)" maxlength="10" />
        <input type="text" id="v-room" placeholder="방 코드 (예: soccer123)" maxlength="30" />
        <button class="room-btn" onclick="joinVideo()">통화 시작</button>
      </div>
    </div>
    <div id="video-ui">
      <div id="video-header">
        <div id="video-room-name"></div>
        <div id="video-status">연결 중...</div>
      </div>
      <div id="video-grid"></div>
      <div id="video-controls">
        <button class="ctrl-btn gray" id="btn-mic" onclick="toggleMic()" title="마이크">🎤</button>
        <button class="ctrl-btn red" onclick="leaveVideo()" title="통화 종료">📵</button>
        <button class="ctrl-btn gray" id="btn-cam" onclick="toggleCam()" title="카메라">📷</button>
      </div>
    </div>
  </div>
</div>

<div id="hidden-overlay">
  <div class="emoji">😴</div>
  <p>앱이 숨겨졌습니다</p>
  <small>Alt 키를 다시 누르면 돌아옵니다</small>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onChildAdded, onValue, set, remove, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyC_VMZjnyTewohDSkQU_idbHXrhqSykkZA",
  authDomain: "stealth-chat-ebea8.firebaseapp.com",
  databaseURL: "https://stealth-chat-ebea8-default-rtdb.firebaseio.com",
  projectId: "stealth-chat-ebea8",
  storageBucket: "stealth-chat-ebea8.firebasestorage.app",
  messagingSenderId: "322324385622",
  appId: "1:322324385622:web:c02fd2b0da8317129f50f7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 공통 ──
function getTime(){
  const n=new Date(),h=n.getHours(),m=String(n.getMinutes()).padStart(2,'0');
  return h>=12?`오후 ${h===12?12:h-12}:${m}`:`오전 ${h||12}:${m}`;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');
}
document.getElementById('search-input').addEventListener('keydown',e=>{ if(e.key==='Enter')doSearch(); });
document.querySelectorAll('.g-btn').forEach(b=>b.addEventListener('click',doSearch));

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const map={search:0,chat:1,video:2};
  document.querySelectorAll('.tab')[map[tab]].classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}
window.switchTab=switchTab;

// ── 채팅 ──
let myNick='', roomCode='', msgRef=null, mySessionId=Date.now()+'_'+Math.random();

function joinRoom(){
  const nick=document.getElementById('input-nick').value.trim();
  const room=document.getElementById('input-room').value.trim();
  if(!nick){showToast('닉네임을 입력하세요');return;}
  if(!room){showToast('방 코드를 입력하세요');return;}
  myNick=nick; roomCode=room;
  document.getElementById('room-setup').style.display='none';
  document.getElementById('chat-ui').classList.add('show');
  document.getElementById('chat-room-name').textContent='방: '+room;
  msgRef=ref(db,'rooms/'+roomCode+'/messages');
  const joinTime=Date.now();
  push(msgRef,{type:'join',nick:myNick,time:getTime(),ts:serverTimestamp(),sid:mySessionId});
  onChildAdded(msgRef,(snap)=>{
    const d=snap.val();
    if(!d||d.sid===mySessionId) return;
    if(d.ts && d.ts < joinTime-3000) return;
    if(d.type==='join') addSys(d.nick+' 님이 입장했습니다');
    else if(d.type==='leave') addSys(d.nick+' 님이 나갔습니다');
    else if(d.type==='msg') addMsg(d.nick,d.text,d.time,false);
  });
}
window.joinRoom=joinRoom;

function sendMsg(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||!msgRef)return;
  const time=getTime();
  push(msgRef,{type:'msg',nick:myNick,text,time,ts:serverTimestamp(),sid:mySessionId});
  addMsg(myNick,text,time,true);
  input.value='';
}
window.sendMsg=sendMsg;
document.getElementById('msg-input').addEventListener('keydown',e=>{ if(e.key==='Enter')sendMsg(); });

function leaveRoom(){
  if(msgRef) push(msgRef,{type:'leave',nick:myNick,time:getTime(),ts:serverTimestamp(),sid:mySessionId});
  msgRef=null;
  document.getElementById('messages').innerHTML='';
  document.getElementById('chat-ui').classList.remove('show');
  document.getElementById('room-setup').style.display='flex';
}
window.leaveRoom=leaveRoom;

function addMsg(nick,text,time,isMe){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='msg-row'+(isMe?' me':'');
  div.innerHTML=`<div class="bubble">${esc(text)}</div><div class="msg-meta">${isMe?'':esc(nick)+' · '}${time}</div>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}
function addSys(text){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='sys-msg'; div.textContent=text;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

// ── 영상통화 (WebRTC) ──
let localStream=null, peers={}, vNick='', vRoom='', vSid=Date.now()+'v'+Math.random();
let micOn=true, camOn=true;
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function joinVideo(){
  const nick=document.getElementById('v-nick').value.trim();
  const room=document.getElementById('v-room').value.trim();
  if(!nick){showToast('닉네임을 입력하세요');return;}
  if(!room){showToast('방 코드를 입력하세요');return;}
  vNick=nick; vRoom=room;

  try {
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  } catch(e){
    showToast('카메라/마이크 권한을 허용해주세요!'); return;
  }

  document.getElementById('video-setup').style.display='none';
  document.getElementById('video-ui').classList.add('show');
  document.getElementById('video-room-name').textContent='방: '+room;
  document.getElementById('video-status').textContent='연결됨 ✓';
  document.getElementById('video-status').style.color='#34a853';

  addVideoTile('local', localStream, nick+' (나)');

  const sigRef=ref(db,'video/'+vRoom+'/signals');
  const presRef=ref(db,'video/'+vRoom+'/presence/'+vSid);
  await set(presRef,{nick:vNick, sid:vSid, ts:serverTimestamp()});

  // 기존 참가자들에게 offer
  const presListRef=ref(db,'video/'+vRoom+'/presence');
  onValue(presListRef,async(snap)=>{
    const all=snap.val()||{};
    for(const sid of Object.keys(all)){
      if(sid!==vSid && !peers[sid]){
        await createOffer(sid);
      }
    }
  },{onlyOnce:true});

  // 시그널 수신
  onChildAdded(sigRef,async(snap)=>{
    const d=snap.val();
    if(!d||d.to!==vSid) return;
    if(d.type==='offer') await handleOffer(d);
    else if(d.type==='answer') await handleAnswer(d);
    else if(d.type==='candidate') await handleCandidate(d);
  });
}
window.joinVideo=joinVideo;

function addVideoTile(id, stream, name){
  const grid=document.getElementById('video-grid');
  const tile=document.createElement('div');
  tile.className='video-tile'; tile.id='tile-'+id;
  const count=grid.children.length+1;
  const size=count<=1?'min(480px,90vw)':count<=2?'min(320px,45vw)':'min(240px,30vw)';
  tile.style.cssText=`width:${size};height:${size==='min(480px,90vw)'?'360px':'240px'};`;
  const video=document.createElement('video');
  video.autoplay=true; video.playsInline=true; video.muted=(id==='local');
  video.srcObject=stream;
  const tag=document.createElement('div');
  tag.className='name-tag'; tag.textContent=name;
  tile.appendChild(video); tile.appendChild(tag);
  grid.appendChild(tile);
}

async function createOffer(toSid){
  const pc=new RTCPeerConnection(ICE);
  peers[toSid]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{ if(e.candidate) sendSignal({type:'candidate',to:toSid,from:vSid,candidate:e.candidate}); };
  pc.ontrack=e=>{ if(!document.getElementById('tile-'+toSid)) addVideoTile(toSid,e.streams[0],'친구'); };
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  sendSignal({type:'offer',to:toSid,from:vSid,sdp:offer.sdp,nick:vNick});
}

async function handleOffer(d){
  const pc=new RTCPeerConnection(ICE);
  peers[d.from]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{ if(e.candidate) sendSignal({type:'candidate',to:d.from,from:vSid,candidate:e.candidate}); };
  pc.ontrack=e=>{ if(!document.getElementById('tile-'+d.from)) addVideoTile(d.from,e.streams[0],d.nick||'친구'); };
  await pc.setRemoteDescription({type:'offer',sdp:d.sdp});
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  sendSignal({type:'answer',to:d.from,from:vSid,sdp:answer.sdp});
}

async function handleAnswer(d){
  const pc=peers[d.from];
  if(pc) await pc.setRemoteDescription({type:'answer',sdp:d.sdp});
}

async function handleCandidate(d){
  const pc=peers[d.from];
  if(pc) try{ await pc.addIceCandidate(d.candidate); }catch(e){}
}

function sendSignal(obj){
  push(ref(db,'video/'+vRoom+'/signals'),{...obj,ts:serverTimestamp()});
}

function toggleMic(){
  micOn=!micOn;
  localStream.getAudioTracks().forEach(t=>t.enabled=micOn);
  document.getElementById('btn-mic').textContent=micOn?'🎤':'🔇';
  document.getElementById('btn-mic').classList.toggle('off',!micOn);
}
window.toggleMic=toggleMic;

function toggleCam(){
  camOn=!camOn;
  localStream.getVideoTracks().forEach(t=>t.enabled=camOn);
  document.getElementById('btn-cam').textContent=camOn?'📷':'🚫';
  document.getElementById('btn-cam').classList.toggle('off',!camOn);
}
window.toggleCam=toggleCam;

function leaveVideo(){
  Object.values(peers).forEach(pc=>pc.close());
  peers={};
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  localStream=null;
  remove(ref(db,'video/'+vRoom+'/presence/'+vSid));
  document.getElementById('video-grid').innerHTML='';
  document.getElementById('video-ui').classList.remove('show');
  document.getElementById('video-setup').style.display='flex';
}
window.leaveVideo=leaveVideo;

// ── 숨기기 ──
let hidden=false;
document.addEventListener('keydown',e=>{
  if(e.altKey){ e.preventDefault(); hidden=!hidden; document.getElementById('hidden-overlay').classList.toggle('show',hidden); }
});
</script>
</body>
</html>
