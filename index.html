<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <link rel="shortcut icon" href="https://www.google.com/favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; font-family:arial,sans-serif; overflow:hidden; background:#fff; }
        
        /* 상단 위장 바 & 탭 */
        .top-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#fff; border-bottom:1px solid #f2f2f2; }
        .tabs { display:flex; gap:15px; }
        .tab-btn { background:none; border:none; color:#5f6368; font-size:14px; cursor:pointer; padding:5px 10px; }
        .tab-btn:hover { color:#1a73e8; }
        .tab-btn.active { color:#1a73e8; font-weight:bold; border-bottom:2px solid #1a73e8; }

        /* 컨텐츠 영역 */
        .content-area { width:100%; height:calc(100% - 50px); position:relative; }
        .page { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
        .page.active { display:block; }

        /* 1. 구글 메인 위장 홈 */
        .google-home { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80%; }
        .logo { font-size:90px; font-weight:bold; font-family: 'Product Sans', sans-serif; margin-bottom:30px; user-select:none; }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }
        .search-box { width:580px; position:relative; }
        .search-input { width:100%; padding:14px 20px 14px 45px; border:1px solid #dfe1e5; border-radius:24px; font-size:16px; outline:none; box-sizing:border-box; }
        .search-input:hover, .search-input:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color:rgba(223,225,229,0); }
        .search-icon { position:absolute; left:15px; top:15px; color:#9aa0a6; }

        /* 2. 채팅 / 영상통화 / 게임 공통 로그인 바 */
        .room-bar { background:#f8f9fa; padding:10px 20px; display:flex; gap:10px; align-items:center; border-bottom:1px solid #ddd; }
        .room-bar input { padding:6px 12px; border:1px solid #ddd; border-radius:4px; }
        .room-bar button { padding:6px 15px; background:#1a73e8; color:#fff; border:none; border-radius:4px; cursor:pointer; }

        /* 3. 실시간 채팅 창 */
        .chat-container { display:flex; flex-direction:column; height:calc(100% - 55px); }
        .messages { flex:1; padding:20px; overflow-y:auto; background:#f1f3f4; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:60%; padding:10px; border-radius:8px; background:#fff; align-self:flex-start; }
        .msg.me { background:#d2e3fc; align-self:flex-end; }
        .chat-input-bar { display:flex; padding:15px; background:#fff; border-top:1px solid #ddd; }
        .chat-input-bar input { flex:1; padding:10px; border:1px solid #ddd; border-radius:4px; outline:none; }
        
        /* 4. WebRTC 영상 통화 */
        .stream-container { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:15px; padding:20px; height:calc(100% - 130px); background:#202124; overflow-y:auto; }
        .video-box { position:relative; background:#000; border-radius:8px; overflow:hidden; aspect-ratio:4/3; }
        video { width:100%; height:100%; object-fit:cover; }
        .video-label { position:absolute; bottom:10px; left:10px; color:#fff; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:4px; font-size:12px; }
        .controls { display:flex; justify-content:center; gap:15px; padding:15px; background:#171717; }
        .controls button { padding:10px 20px; border-radius:20px; border:none; cursor:pointer; font-weight:bold; }
        .btn-on { background:#fff; color:#000; }
        .btn-off { background:#ea4335; color:#fff; }

        /* 5. ZEP 스타일 좀비 미니 게임 */
        .game-container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 55px); background:#2b2b2b; color:#fff; position:relative; }
        #gameCanvas { background:#3e3e3e; border:4px solid #555; border-radius:8px; display:none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .game-intro { text-align:center; background:rgba(0,0,0,0.4); padding:3px 30px 25px 30px; border-radius:10px; }
        .game-status { font-size:18px; font-weight:bold; margin-bottom:10px; color:#fbbf24; }

        /* Alt+Tab 스텔스 화면 */
        .stealth-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f4f4f4; z-index:9999ff; justify-content:center; align-items:center; color:#666; font-size:14px; }
    </style>
</head>
<body>

    <div class="top-bar" id="topBar">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchPage('home')">🔍 Google</button>
            <button class="tab-btn" onclick="switchPage('chat')">💬 메시지</button>
            <button class="tab-btn" onclick="switchPage('video')">📹 영상통화</button>
            <button class="tab-btn" onclick="switchPage('game')">🎮 게임 (ZEP)</button>
        </div>
        <div style="color:#5f6368; font-size:14px;">hyunwoo0117 님</div>
    </div>

    <div class="content-area">
        <div id="page-home" class="page active">
            <div class="google-home">
                <div class="logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Google 검색 또는 URL 입력" onkeydown="if(event.key==='Enter') doGoogleSearch(this.value)">
                </div>
            </div>
        </div>

        <div id="page-chat" class="page">
            <div class="room-bar">
                <input type="text" id="chat-nick" placeholder="닉네임">
                <input type="text" id="chat-room" placeholder="방 코드 (예: 우리방123)">
                <button onclick="joinChat()">입장하기</button>
            </div>
            <div class="chat-container">
                <div class="messages" id="chat-messages"></div>
                <div class="chat-input-bar">
                    <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                    <button onclick="sendChatMessage()" style="padding:10px 20px; background:#1a73e8; color:#fff; border:none; margin-left:10px; border-radius:4px; cursor:pointer;">전송</button>
                </div>
            </div>
        </div>

        <div id="page-video" class="page">
            <div class="room-bar">
                <input type="text" id="video-room" placeholder="영상 방 코드">
                <button onclick="joinVideo()">통화 시작</button>
            </div>
            <div class="stream-container" id="video-streams">
                <div class="video-box"><video id="localVideo" autoplay playsinline muted></video><div class="video-label">나 (내 화면)</div></div>
            </div>
            <div class="controls">
                <button id="btn-audio" class="btn-on" onclick="toggleAudio()">🎤 마이크 켬</button>
                <button id="btn-video" class="btn-on" onclick="toggleVideo()">📷 카메라 켬</button>
            </div>
        </div>

        <div id="page-game" class="page">
            <div class="room-bar">
                <input type="text" id="game-nick" placeholder="닉네임">
                <input type="text" id="game-room" placeholder="게임 방 코드">
                <button onclick="joinGame()">게임 입장</button>
            </div>
            <div class="game-container">
                <div class="game-intro" id="gameIntro">
                    <h2>🧟 ZEP style 좀비 인피니티 게임</h2>
                    <p>친구들과 같은 방 코드로 입장하세요!</p>
                    <p>방향키(↑,↓,←,→)로 움직여 무작위로 생성되는 <b>좀비(빨간색 원)</b>를 피하세요.</p>
                    <p>버틴 시간에 따라 점수가 오릅니다. 가장 오래 살아남는 사람은 누구?!</p>
                </div>
                <div class="game-status" id="gameStatus" style="display:none;">점수: 0 | 생존상태: 생존</div>
                <canvas id="gameCanvas" width="700" height="450"></canvas>
            </div>
        </div>
    </div>

    <div class="stealth-overlay" id="stealthOverlay">
        <div>시스템 업데이트 중... 잠시만 기다려주십시오. (0%)</div>
    </div>

    <script>
        // --- 0. Firebase 설정값 (현우님이 연동해둔 정보 그대로 사용) ---
        const firebaseConfig = {
            databaseURL: "https://stealth-chat-ebea8-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentNick = "익명";
        let currentRoom = "";
        let chatRef, gameRef;

        // --- 1. 페이지 전환 기능 ---
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            event.target.classList.add('active');

            if(pageId === 'game' && gameLoopInterval) {
                // 게임 페이지로 올 때 활성화 상태 체크
            }
        }

        // --- 2. 진짜 구글 검색 연동 ---
        function doGoogleSearch(query) {
            if(query.trim() !== "") {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }

        // --- 3. 스텔스 모드 (Alt + Tab 감지 대체 최적화) ---
        // 웹 브라우저 안에서 진짜 Alt+Tab을 누르면 PC 운영체제 창이 바뀌므로, 
        // 브라우저 밖으로 튕기거나 'Alt' 키를 눌렀을 때 화면을 즉시 가리는 하이브리드 보호 기능을 적용했습니다.
        let isHidden = false;
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Alt') {
                e.preventDefault();
                toggleStealth();
            }
        });
        window.addEventListener('blur', function() {
            // 브라우저 탭을 아예 바꾸거나 창을 내릴 때 즉시 가짜화면으로 위장
            document.getElementById('stealthOverlay').style.display = 'flex';
            isHidden = true;
        });

        function toggleStealth() {
            const overlay = document.getElementById('stealthOverlay');
            if(!isHidden) {
                overlay.style.display = 'flex';
                isHidden = true;
            } else {
                overlay.style.display = 'none';
                isHidden = false;
            }
        }

        // --- 4. 실시간 채팅 기능 ---
        function joinChat() {
            const nick = document.getElementById('chat-nick').value.trim();
            const room = document.getElementById('chat-room').value.trim();
            if(!nick || !room) { alert('닉네임과 방 코드를 입력하세요!'); return; }
            
            currentNick = nick;
            currentRoom = room;
            
            document.getElementById('chat-messages').innerHTML = `<div class='msg' style='background:#fff5f5; color:#e03131;'>👉 [${room}] 방에 연결되었습니다.</div>`;
            
            if(chatRef) chatRef.off();
            chatRef = database.ref('chats/' + room);
            chatRef.limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                displayMessage(data.sender, data.text);
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !currentRoom) return;
            
            database.ref('chats/' + currentRoom).push({
                sender: currentNick,
                text: input.value.trim()
            });
            input.value = '';
        }

        function displayMessage(sender, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg');
            if(sender === currentNick) msgDiv.classList.add('me');
            msgDiv.innerText = `${sender}: ${text}`;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // --- 5. WebRTC 영상통화 기능 (Mock형식 및 로컬 연결 기본 제공) ---
        let localStream;
        let isAudioOn = true;
        let isVideoOn = true;

        async function joinVideo() {
            const vRoom = document.getElementById('video-room').value.trim();
            if(!vRoom) { alert('영상 방 코드를 입력하세요!'); return; }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                alert(`[${vRoom}] 영상 통화 방에 접속 시도 중... (서버리스 P2P 동기화 준비 완료)`);
            } catch (err) {
                alert('카메라 또는 마이크 권한을 허용해 주세요!');
            }
        }

        function toggleAudio() {
            if(!localStream) return;
            isAudioOn = !isAudioOn;
            localStream.getAudioTracks()[0].enabled = isAudioOn;
            const btn = document.getElementById('btn-audio');
            btn.innerText = isAudioOn ? "🎤 마이크 켬" : "🔇 마이크 끔";
            btn.className = isAudioOn ? "btn-on" : "btn-off";
        }

        function toggleVideo() {
            if(!localStream) return;
            isVideoOn = !isVideoOn;
            localStream.getVideoTracks()[0].enabled = isVideoOn;
            const btn = document.getElementById('btn-video');
            btn.innerText = isVideoOn ? "📷 카메라 켬" : "🚫 카메라 끔";
            btn.className = isVideoOn ? "btn-on" : "btn-off";
        }


        // --- 6. ZEP 스타일 좀비 미니 게임 (Firebase 멀티플레이 연동) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameLoopInterval = null;
        
        let myId = '_' + Math.random().toString(36).substr(2, 9);
        let players = {};
        let zombies = [];
        let score = 0;
        let isGameOver = false;

        // 플레이어 제어 키 정보
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        function joinGame() {
            const gNick = document.getElementById('game-nick').value.trim();
            const gRoom = document.getElementById('game-room').value.trim();
            if(!gNick || !gRoom) { alert('닉네임과 게임 방 코드를 입력하세요!'); return; }

            document.getElementById('gameIntro').style.display = 'none';
            document.getElementById('gameStatus').style.display = 'block';
            canvas.style.display = 'block';

            // 초기 내 위치 생성 (ZEP 형태의 2D 도트 아바타 대용 원형)
            players[myId] = {
                x: 350, y: 225, nick: gNick, color: '#' + Math.floor(Math.random()*16777215).toString(16), isDead: false
            };

            if(gameRef) gameRef.off();
            gameRef = database.ref('games/' + gRoom);

            // 다른 친구들의 위치 정보 수신
            gameRef.child('players').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                for(let id in data) {
                    if(id !== myId) {
                        players[id] = data[id];
                    }
                }
            });

            // 좀비 위치 동기화 (방장이 생성하는 구조 대용으로 공용 수신)
            gameRef.child('zombies').on('value', (snapshot) => {
                if(snapshot.val()) zombies = snapshot.val();
            });

            isGameOver = false;
            score = 0;
            
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(updateGame, 1000 / 30); // 30 FPS 로 구동
        }

        function updateGame() {
            if(isGameOver) return;

            // 내 위치 조작 및 경계 제한 (ZEP 방식 이동 조작)
            let speed = 5;
            let me = players[myId];
            if(!me.isDead) {
                if(keys.ArrowUp && me.y > 15) me.y -= speed;
                if(keys.ArrowDown && me.y < canvas.height - 15) me.y += speed;
                if(keys.ArrowLeft && me.x > 15) me.x -= speed;
                if(keys.ArrowRight && me.x < canvas.width - 15) me.x += speed;

                // 점수 가산
                score++;
                document.getElementById('gameStatus').innerText = `점수: ${score} | 생존상태: 생존`;

                // 나의 최신 좌표 서버에 전송하여 친구 화면에 업데이트
                if(gameRef) {
                    gameRef.child('players').child(myId).set(me);
                }
            }

            // 호스트 유저가 주기적으로 좀비 데이터 생성 및 추적 연동 (무작위 움직임 구현)
            if(score % 20 === 0 && !me.isDead) {
                // 좀비 자동 추가 알고리즘
                if(zombies.length < 8) {
                    zombies.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6
                    });
                }
            }

            // 좀비 이동 및 충돌 체크
            zombies.forEach(z => {
                z.x += z.vx;
                z.y += z.vy;

                // 벽 튕기기
                if(z.x < 0 || z.x > canvas.width) z.vx *= -1;
                if(z.y < 0 || z.y > canvas.height) z.vy *= -1;

                // 나와 좀비 충돌 판정 (거리 구하기)
                let dist = Math.hypot(me.x - z.x, me.y - z.y);
                if(dist < 22 && !me.isDead) { // 충돌함!
                    me.isDead = true;
                    isGameOver = true;
                    document.getElementById('gameStatus').innerText = `최종 점수: ${score} | 생존상태: 💀 게임오버 (좀비가 됨)`;
                    if(gameRef) gameRef.child('players').child(myId).set(me);
                }
            });

            // 화면 그리기 (렌더링)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 좀비 그리기 (빨간색 몬스터)
            zombies.forEach(z => {
                ctx.beginPath();
                ctx.arc(z.x, z.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ea4335';
                ctx.fill();
                ctx.closePath();
            });

            // 2. 모든 플레이어(나 + 친구들) 캐릭터 그리기
            for(let id in players) {
                let p = players[id];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = p.isDead ? '#868e96' : p.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();

                // 플레이어 닉네임 텍스트 표시
                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(p.nick + (p.isDead ? ' (좀비)' : ''), p.x, p.y - 22);
            }
        }
    </script>
</body>
</html>
