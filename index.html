<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="shortcut icon" href="https://www.google.com/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin:0; padding:0; width:100%; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; overflow:hidden; background:#fff; user-select: none; }
        
        /* 완벽한 위장용 레이아웃 */
        #stealth-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f1f3f4; z-index:999999; }
        .google-header { height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 20px; border-bottom:1px solid #f2f2f2; background:#fff; }
        .header-left, .header-right { display:flex; align-items:center; gap:15px; }
        .nav-btn { background:none; border:none; color:#5f6368; font-size:14px; cursor:pointer; padding:8px 12px; border-radius:4px; font-weight:bold; transition: 0.2s; }
        .nav-btn:hover { background:#f8f9fa; color:#1a73e8; }
        .nav-btn.active { color:#1a73e8; border-bottom:2px solid #1a73e8; border-radius:0; }

        .content-container { width:100%; height:calc(100% - 60px); position:relative; }
        .tab-panel { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
        .tab-panel.active { display:block; }

        /* 1. 구글 검색 홈 위장 패널 */
        .search-panel { display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:120px; }
        .logo { font-size:90px; font-weight:bold; margin-bottom:30px; letter-spacing:-2px; }
        .logo span:nth-child(1) { color: #4285F4; } .logo span:nth-child(2) { color: #EA4335; } .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; } .logo span:nth-child(5) { color: #34A853; } .logo span:nth-child(6) { color: #EA4335; }
        .search-box-wrapper { width:100%; max-width:584px; position:relative; margin-bottom:30px; }
        .search-input { width:100%; height:46px; border:1px solid #dfe1e5; border-radius:24px; padding:0 45px 0 20px; font-size:16px; outline:none; transition:box-shadow 0.2s; }
        .search-input:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color:rgba(223,225,229,0); }
        .search-buttons { display:flex; gap:12px; }
        .g-btn { background:#f8f9fa; border:1px solid #f8f9fa; color:#3c4043; font-size:14px; padding:10px 16px; border-radius:4px; cursor:pointer; }
        .g-btn:hover { border:1px solid #dadce0; color:#202124; background:#f1f3f4; }

        /* ZEP 랜덤 매칭 로그인창 */
        .room-config-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:#fff; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .config-box { background:#f8f9fa; border:1px solid #dadce0; padding:30px; border-radius:12px; width:360px; display:flex; flex-direction:column; gap:15px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .config-box h3 { margin:0 0 5px 0; color:#202124; text-align:center; font-size:20px; }
        .config-box p { margin:0; text-align:center; color:#5f6368; font-size:12px; line-height:1.4; }
        .config-box input { width:100%; height:45px; padding:0 12px; border:1px solid #dadce0; border-radius:6px; outline:none; font-size:15px; }
        .config-box button { background:#1a73e8; color:#fff; border:none; height:45px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:15px; transition: 0.2s; }
        .config-box button:hover { background:#1557b0; }

        /* ZEP 메타버스 좀비 게임 전용 구역 */
        .game-main { width:100%; height:100%; display:flex; background:#22252c; justify-content:center; align-items:center; position:relative; }
        .game-canvas-container { position:relative; width:900px; height:600px; background:#343a40; box-shadow:0 12px 40px rgba(0,0,0,0.6); border-radius:8px; overflow:hidden; border:4px solid #495057; }
        
        /* ZEP 스타일 상단 실시간 UI 정보판 */
        .zep-ui-header { position:absolute; top:0; left:0; width:100%; height:50px; background:rgba(0,0,0,0.75); display:flex; justify-content:space-between; align-items:center; padding:0 20px; color:#fff; font-size:14px; font-weight:bold; z-index:10; border-bottom:1px solid #495057; }
        .zep-timer { background:#e63946; padding:4px 12px; border-radius:15px; font-size:15px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }
        
        #zep-canvas { display:block; background:#2b2d42; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="stealth-overlay"></div>

    <header class="google-header">
        <div class="header-left">
            <button class="nav-btn active" onclick="switchTab('search')">🔍 Google</button>
            <button class="nav-btn" onclick="switchTab('game')">🎮 ZEP 실시간 좀비광장</button>
        </div>
        <div class="header-right">
            <span style="color:#1a73e8; font-size:13px; font-weight:bold; background:#e8f0fe; padding:5px 12px; border-radius:15px;">🌐 글로벌 공용 멀티플레이 광장</span>
            <div style="width:32px; height:32px; background:#e63946; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">Z</div>
        </div>
    </header>

    <div class="content-container">
        
        <div id="panel-search" class="tab-panel active">
            <div class="search-panel">
                <div class="logo">
                    <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
                </div>
                <div class="search-box-wrapper">
                    <input type="text" id="google-search-input" class="search-input" autofocus placeholder="구글에서 검색 또는 URL 입력">
                </div>
                <div class="search-buttons">
                    <button class="g-btn" onclick="executeGoogleSearch()">Google 검색</button>
                    <button class="g-btn" onclick="alert('ZEP 엔진이 백그라운드에서 동기화 중입니다.')">I'm Feeling Lucky</button>
                </div>
            </div>
        </div>

        <div id="panel-game" class="tab-panel">
            <div id="zep-config" class="room-config-overlay">
                <div class="config-box">
                    <h3>🧟 ZEP 좀비 서바이벌</h3>
                    <p>별도의 방 개설 없이, 전 세계에서 랜덤으로 들어온 플레이어들과 한 공간에서 실시간 술래잡기를 펼칩니다.</p>
                    <input type="text" id="zep-nickname" placeholder="광장에서 사용할 닉네임" maxlength="10">
                    <button onclick="joinZepGlobalSquare()">글로벌 광장 입장하기</button>
                </div>
            </div>

            <div class="game-main">
                <div class="game-canvas-container">
                    <div class="zep-ui-header">
                        <div id="zep-player-count">👥 생존 현황: 대기 중</div>
                        <div class="zep-timer" id="zep-game-timer">⏳ 대기 중...</div>
                        <div id="zep-my-status" style="color:#4cc9f0;">내 상태: 미정</div>
                    </div>
                    <canvas id="zep-canvas" width="850" height="540" style="margin-top:50px;"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Firebase 기존 설정 규격 주소 완벽 유지
        const firebaseConfig = { databaseURL: "https://stealth-chat-ebea8-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let appState = { currentTab: 'search', altTabHidden: false };
        
        // ZEP 글로벌 공용 엔진 변수 (전체 인원이 만나도록 단일 고정 공간 정의)
        const GLOBAL_SQUARE_ID = "zep_global_zombie_square";
        let playersRef = null;
        let gameStateRef = null;
        let myId = null;
        
        let localPlayerObj = {
            x: 150 + Math.random() * 500,
            y: 150 + Math.random() * 300,
            name: '',
            role: 'human', // human(인간), zombie(좀비)
            lastMove: Date.now()
        };
        
        let allPlayersData = {};
        let currentSystemState = { status: "waiting", timer: 0 };
        let localKeys = {};
        let canvas, ctx;

        // Alt 즉각 은닉 가동
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Alt') {
                e.preventDefault();
                appState.altTabHidden = !appState.altTabHidden;
                document.getElementById('stealth-overlay').style.display = appState.altTabHidden ? 'block' : 'none';
            }
        });

        function switchTab(tabId) {
            appState.currentTab = tabId;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tabId}`).classList.add('active');
        }

        function executeGoogleSearch() {
            const query = document.getElementById('google-search-input').value;
            if(!query.trim()) return;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        }

        // --- ZEP 좀비 온라인 구역 시동 로직 ---
        function joinZepGlobalSquare() {
            const nick = document.getElementById('zep-nickname').value.trim();
            if(!nick) return alert('광장에서 식별될 닉네임을 입력하세요!');

            localPlayerObj.name = nick;
            myId = "user_" + Math.random().toString(36).substr(2, 9);

            document.getElementById('zep-config').style.display = 'none';
            
            canvas = document.getElementById('zep-canvas');
            ctx = canvas.getContext('2d');

            // 랜덤 멀티플레이어 통신 통합 패스 구축
            playersRef = database.ref(`${GLOBAL_SQUARE_ID}/players`);
            gameStateRef = database.ref(`${GLOBAL_SQUARE_ID}/state`);

            // 내 객체 등록 및 접속 끊김 대책 수립
            playersRef.child(myId).set(localPlayerObj);
            playersRef.child(myId).onDisconnect().remove();

            // 실시간 원격 유저 데이터 미러링 동기화
            playersRef.on('value', snapshot => {
                allPlayersData = snapshot.val() || {};
                checkLocalRoleUpdate();
            });

            // 글로벌 단일 게임 시스템 타이머/스테이트 모니터링
            gameStateRef.on('value', snapshot => {
                const s = snapshot.val();
                if(s) {
                    currentSystemState = s;
                } else {
                    // 최초 데이터베이스 방 생성 시 타이머 마스터 통제권 양도
                    gameStateRef.set({ status: "waiting", timer: 30, host: myId });
                }
            });

            // 키 리스너 바인딩
            window.addEventListener('keydown', e => { localKeys[e.code] = true; });
            window.addEventListener('keyup', e => { localKeys[e.code] = false; });

            // 타이머 마스터 시스템 권한 룸 운영 (호스트가 타이머를 계산하여 실시간 배포)
            setInterval(manageGlobalTimerLogic, 1000);

            // ZEP 그래픽 드로잉 루프 가동
            requestAnimationFrame(zepMainGameLoop);
        }

        // 내 역할이 다른 플레이어(좀비)에 의해 변했는지 수시 감지
        function checkLocalRoleUpdate() {
            if(allPlayersData[myId] && allPlayersData[myId].role !== localPlayerObj.role) {
                localPlayerObj.role = allPlayersData[myId].role;
                if(localPlayerObj.role === 'zombie') {
                    document.getElementById('zep-my-status').style.color = '#e63946';
                }
            }
        }

        // --- ZEP 공용 매칭/타이머 거버넌스 시스템 ---
        function manageGlobalTimerLogic() {
            if (!currentSystemState || !myId) return;
            
            // 현재 광장에 접속 중인 유저 리스트 추출
            const playerIds = Object.keys(allPlayersData);
            if (playerIds.length === 0) return;

            // 순서 정렬 기준 첫 번째 접속 유저를 방의 호스트로 지정하여 타이머 관리 일원화
            const currentHost = playerIds.sort()[0];
            if (currentHost !== myId) return;

            let nextTimer = currentSystemState.timer - 1;
            let nextStatus = currentSystemState.status;

            if (nextTimer <= 0) {
                if (nextStatus === "waiting") {
                    // 최소 2인 이상일 때 랜덤 좀비 술래잡기 시작
                    if (playerIds.length >= 2) {
                        nextStatus = "playing";
                        nextTimer = 90; // 90초간 좀비 서바이벌 대결
                        
                        // 랜덤으로 1명을 '숙주 좀비' 술래로 선발
                        const randomPickZombie = playerIds[Math.floor(Math.random() * playerIds.length)];
                        playersRef.child(randomPickZombie).update({ role: "zombie" });
                    } else {
                        // 혼자 있으면 무한 대기
                        nextTimer = 15;
                    }
                } else if (nextStatus === "playing") {
                    // 게임 리셋 및 종료
                    nextStatus = "waiting";
                    nextTimer = 20; // 다음 라운드 리셋 대기 시간 20초
                    
                    // 전원 인간으로 초기 리셋 복구
                    playerIds.forEach(id => {
                        playersRef.child(id).update({ role: "human", x: 150 + Math.random()*500, y: 150 + Math.random()*250 });
                    });
                }
            }

            gameStateRef.update({ status: nextStatus, timer: nextTimer, host: currentHost });
        }

        // --- ZEP 메타버스 물리 연산 및 타일맵 드로잉 룹 ---
        function zepMainGameLoop() {
            if(!myId) return;

            handleZepMovement();
            checkZepInfectionCollision();

            // 1. 배경 클리어 및 ZEP 격자 타일 스타일 드로잉
            ctx.fillStyle = "#34495e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 2;
            const tileSize = 40;
            for(let x=0; x<canvas.width; x+=tileSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y=0; y<canvas.height; y+=tileSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 외곽 경계 벽 울타리 펜스 스타일링 렌더링
            ctx.strokeStyle = "#e63946"; ctx.lineWidth = 6;
            ctx.strokeRect(5, 5, canvas.width - 10, canvas.height - 10);

            // 2. 글로벌 광장에 접속된 모든 실시간 랜덤 유저들 드로잉
            let zombieCount = 0;
            let humanCount = 0;

            Object.keys(allPlayersData).forEach(id => {
                const p = allPlayersData[id];
                const isZombie = (p.role === 'zombie');
                
                if (isZombie) zombieCount++; else humanCount++;

                // ZEP 특유의 귀여운 원형 발판 그림자 묘사
                ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
                ctx.beginPath(); ctx.arc(p.x, p.y + 12, 14, 0, Math.PI * 2); ctx.fill();

                // 캐릭터 본체 스킨 매핑 (좀비: 초록형광, 인간: 밝은 보라/파랑 계열)
                ctx.fillStyle = isZombie ? "#2a9d8f" : "#457b9d";
                ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill();

                // 술래(좀비)일 경우 인지하기 쉽도록 강렬한 아케이드 안광 헤어 밴드 효과 추가
                if(isZombie) {
                    ctx.fillStyle = "#e63946";
                    ctx.beginPath(); ctx.arc(p.x - 5, p.y - 3, 3, 0, Math.PI * 2); ctx.arc(p.x + 5, p.y - 3, 3, 0, Math.PI * 2); ctx.fill();
                    // 좀비 표식 안테나 링
                    ctx.strokeStyle = "#e63946"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 19, 0, Math.PI*2); ctx.stroke();
                } else {
                    // 인간 캐릭터 눈 렌더링
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(p.x - 4, p.y - 3, 2, 0, Math.PI * 2); ctx.arc(p.x + 4, p.y - 3, 2, 0, Math.PI * 2); ctx.fill();
                }

                // 닉네임 및 소속 라벨 텍스트 표기
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(p.name, p.x, p.y - 22);

                // 역할 표시 칩 달아주기
                ctx.fillStyle = isZombie ? "#ff4d4d" : "#a8dadc"; ctx.font = "9px sans-serif";
                ctx.fillText(isZombie ? "[좀비]" : "[인간]", p.x, p.y - 34);
            });

            // 3. 브라우저 실시간 UI 텍스트 정보 매핑 처리
            if (currentSystemState.status === "waiting") {
                document.getElementById('zep-game-timer').innerText = `⏳ 매칭 대기 중: ${currentSystemState.timer}초`;
                document.getElementById('zep-player-count').innerText = `👥 대기실 인원: ${humanCount}명 (최소 2명 필요)`;
            } else {
                document.getElementById('zep-game-timer').innerText = `🧟 생존 한계 시한: ${currentSystemState.timer}초`;
                document.getElementById('zep-player-count').innerText = `👥 인간: ${humanCount}명 | 좀비: ${zombieCount}명`;
            }
            document.getElementById('zep-my-status').innerText = `내 상태: ${localPlayerObj.role === 'zombie' ? '🚨 좀비 (술래)' : '🏃 인간 (도망자)'}`;

            requestAnimationFrame(zepMainGameLoop);
        }

        // ZEP 로컬 캐릭터 정밀 이동 및 경계선 충돌 제어
        function handleZepMovement() {
            let dx = 0; let dy = 0;
            const currentSpeed = localPlayerObj.role === 'zombie' ? 4.8 : 4.0; // ZEP의 밸런스 반영: 좀비가 추격을 위해 살짝 더 빠름

            if (localKeys['ArrowUp'] || localKeys['KeyW']) dy -= currentSpeed;
            if (localKeys['ArrowDown'] || localKeys['KeyS']) dy += currentSpeed;
            if (localKeys['ArrowLeft'] || localKeys['KeyA']) dx -= currentSpeed;
            if (localKeys['ArrowRight'] || localKeys['KeyD']) dx += currentSpeed;

            if (dx !== 0 || dy !== 0) {
                localPlayerObj.x += dx; localPlayerObj.y += dy;
                
                // 외곽 빨간 울타리 경계 박스 충돌 체크 탈출 차단
                localPlayerObj.x = Math.max(25, Math.min(canvas.width - 25, localPlayerObj.x));
                localPlayerObj.y = Math.max(25, Math.min(canvas.height - 25, localPlayerObj.y));
                
                // 파이어베이스 위치 업데이트 패킷 전송
                playersRef.child(myId).update({ x: localPlayerObj.x, y: localPlayerObj.y });
            }
        }

        // ZEP 좀비 술래잡기 시스템의 핵심: 실시간 충돌 및 좀비 바이러스 감염 전파 매커니즘
        function checkZepInfectionCollision() {
            // 내가 좀비 상태일 때만 다른 인간들을 감염시킬 권한이 생김
            if (localPlayerObj.role !== 'zombie' || currentSystemState.status !== 'playing') return;

            Object.keys(allPlayersData).forEach(id => {
                if (id === myId) return; // 나 자신은 패스
                
                const targetPlayer = allPlayersData[id];
                if (targetPlayer.role === 'human') {
                    // 피타고라스 히트박스 충돌 반경 계산 알고리즘
                    const distance = Math.hypot(localPlayerObj.x - targetPlayer.x, localPlayerObj.y - targetPlayer.y);
                    
                    // 두 플레이어의 몸집 반경(28픽셀) 안으로 조우했을 때
                    if (distance < 26) {
                        // 즉시 대상 타깃 유저를 좀비 진영으로 갱신 (전체 화면에 즉시 동기화)
                        playersRef.child(id).update({ role: 'zombie' });
                    }
                }
            });
        }
    </script>
</body>
</html>
